# ================================================================
#  Logstash Pipeline — auth-log.conf
#  Ingests Linux auth.log and syslog into Elasticsearch
#  Project : Linux SIEM Lab
#  Author  : RH Vitharana | SLIIT — BSc (Hons) IT (Cyber Security)
# ================================================================

input {
  file {
    path           => "/var/log/auth.log"
    start_position => "beginning"
    sincedb_path   => "/var/lib/logstash/sincedb_auth"
    type           => "auth"
    tags           => ["linux", "auth", "security"]
    stat_interval  => 1
  }
}

filter {

  # ── Ubuntu 22.04 uses ISO 8601 timestamps ─────────────────────
  # Format: 2026-06-11T12:39:25.863346+05:30 hostname program[pid]: message
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{HOSTNAME:hostname} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}"
    }
    tag_on_failure => ["_grok_parse_failure"]
  }

  # ── Parse ISO 8601 timestamp into @timestamp ──────────────────
  date {
    match   => ["log_timestamp", "ISO8601"]
    target  => "@timestamp"
    timezone => "Asia/Colombo"
  }

  # ── Classify security events ──────────────────────────────────
  if [type] == "auth" and "_grok_parse_failure" not in [tags] {

    if "Failed password" in [log_message] {
      grok {
        match => {
          "log_message" => "Failed password for %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}"
        }
        tag_on_failure => ["_failed_pw_parse_fail"]
      }
      mutate {
        add_tag   => ["ssh_failure"]
        add_field => {
          "event_type"     => "ssh_failure"
          "event_severity" => "high"
          "event_category" => "authentication"
        }
      }
    }

    else if "Invalid user" in [log_message] {
      grok {
        match => {
          "log_message" => "Invalid user %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}"
        }
        tag_on_failure => ["_invalid_user_parse_fail"]
      }
      mutate {
        add_tag   => ["ssh_failure", "invalid_user"]
        add_field => {
          "event_type"     => "invalid_user"
          "event_severity" => "high"
          "event_category" => "authentication"
        }
      }
    }

    else if "Accepted password" in [log_message] or "Accepted publickey" in [log_message] {
      grok {
        match => {
          "log_message" => "Accepted %{WORD:auth_method} for %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}"
        }
        tag_on_failure => ["_accepted_parse_fail"]
      }
      mutate {
        add_tag   => ["ssh_success"]
        add_field => {
          "event_type"     => "ssh_success"
          "event_severity" => "low"
          "event_category" => "authentication"
        }
      }
    }

    else if "sudo" in [program] {
      mutate {
        add_tag   => ["sudo_usage"]
        add_field => {
          "event_type"     => "sudo_usage"
          "event_severity" => "medium"
          "event_category" => "privilege_escalation"
        }
      }
    }

    else if "session opened" in [log_message] {
      mutate {
        add_tag   => ["session_open"]
        add_field => {
          "event_type"     => "session_open"
          "event_severity" => "info"
          "event_category" => "session"
        }
      }
    }

    else if "session closed" in [log_message] {
      mutate {
        add_tag   => ["session_close"]
        add_field => {
          "event_type"     => "session_close"
          "event_severity" => "info"
          "event_category" => "session"
        }
      }
    }

  }

  mutate {
    remove_field => ["log_timestamp"]
  }

}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "auth-logs-%{+YYYY.MM.dd}"
  }
}
